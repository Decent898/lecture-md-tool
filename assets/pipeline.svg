<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="300" viewBox="0 0 1180 300" role="img" aria-labelledby="title desc">
  <title id="title">lecture-md-tool pipeline</title>
  <desc id="desc">Five stages: lecture video, slide split and dedupe, per-slide ASR, LLM correction, and lecture notes output.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/>
    </marker>
    <filter id="cardShadow" x="-12%" y="-18%" width="124%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1180" height="300" rx="24" fill="#f8fafc"/>

  <!-- arrows -->
  <path d="M228 150 H262" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M458 150 H492" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M688 150 H722" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M918 150 H952" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 1 课程录屏 -->
  <g transform="translate(40 55)">
    <rect width="180" height="190" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#cardShadow)"/>
    <rect x="58" y="78" width="64" height="46" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="3.5"/>
    <path d="M82 90l22 11-22 11z" fill="#2563eb"/>
    <text x="90" y="166" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC','Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#0f172a">课程录屏</text>
    <text x="90" y="192" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC','Segoe UI',sans-serif" font-size="13" fill="#64748b">PPT 画面 + 讲课声音</text>
  </g>

  <!-- 2 切页去重 -->
  <g transform="translate(270 55)">
    <rect width="180" height="190" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#cardShadow)"/>
    <rect x="66" y="74" width="56" height="40" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="3"/>
    <rect x="56" y="84" width="56" height="40" rx="6" fill="#ecfeff" stroke="#0891b2" stroke-width="3.5"/>
    <path d="M66 98h36M66 110h26" stroke="#0891b2" stroke-width="3.5" stroke-linecap="round"/>
    <text x="90" y="166" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC','Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#0f172a">切页去重</text>
    <text x="90" y="192" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC','Segoe UI',sans-serif" font-size="13" fill="#64748b">翻页检测 + 防抖去重</text>
  </g>

  <!-- 3 按页转写 -->
  <g transform="translate(500 55)">
    <rect width="180" height="190" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#cardShadow)"/>
    <rect x="78" y="70" width="24" height="42" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="3.5"/>
    <path d="M70 100c0 16 40 16 40 0" fill="none" stroke="#2563eb" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M90 114v14M78 128h24" stroke="#2563eb" stroke-width="3.5" stroke-linecap="round"/>
    <text x="90" y="166" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC','Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#0f172a">按页转写</text>
    <text x="90" y="192" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC','Segoe UI',sans-serif" font-size="13" fill="#64748b">本地 Whisper / API</text>
  </g>

  <!-- 4 纠错优化 -->
  <g transform="translate(730 55)">
    <rect width="180" height="190" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#cardShadow)"/>
    <rect x="58" y="72" width="48" height="56" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="3.5"/>
    <path d="M68 86h28M68 100h20M68 114h26" stroke="#f97316" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M118 80l4 9 9 4-9 4-4 9-4-9-9-4 9-4z" fill="#0f766e"/>
    <text x="90" y="166" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC','Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#0f172a">纠错优化</text>
    <text x="90" y="192" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC','Segoe UI',sans-serif" font-size="13" fill="#64748b">OCR + LLM 术语校正</text>
  </g>

  <!-- 5 讲义输出 -->
  <g transform="translate(960 55)">
    <rect width="180" height="190" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#cardShadow)"/>
    <path d="M62 70h40l16 16v44H62z" fill="#f0fdf4" stroke="#16a34a" stroke-width="3.5" stroke-linejoin="round"/>
    <path d="M102 70v16h16" fill="none" stroke="#16a34a" stroke-width="3.5" stroke-linejoin="round"/>
    <text x="90" y="116" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="800" fill="#16a34a">MD</text>
    <text x="90" y="166" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC','Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#0f172a">讲义输出</text>
    <text x="90" y="192" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC','Segoe UI',sans-serif" font-size="13" fill="#64748b">Markdown / PDF</text>
  </g>

  <text x="590" y="280" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC','Segoe UI',sans-serif" font-size="14" fill="#64748b">增量写盘 · 断点续跑 · 本地与 OpenAI 兼容 API 双后端</text>
</svg>
