<svg xmlns="http://www.w3.org/2000/svg" width="360" height="360" viewBox="0 0 360 360" role="img" aria-labelledby="title desc">
  <title id="title">lecture-md-tool logo</title>
  <desc id="desc">A lecture slide above an audio waveform and a Markdown badge, on a rounded gradient square.</desc>
  <defs>
    <linearGradient id="bg" x1="40" y1="30" x2="330" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="0.6" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="28" y="28" width="304" height="304" rx="64" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- slide card -->
  <rect x="72" y="76" width="216" height="128" rx="16" fill="#ffffff" opacity="0.97"/>
  <rect x="94" y="100" width="96" height="14" rx="7" fill="#2563eb"/>
  <rect x="94" y="130" width="130" height="10" rx="5" fill="#94a3b8"/>
  <rect x="94" y="152" width="104" height="10" rx="5" fill="#cbd5e1"/>
  <rect x="94" y="174" width="76" height="10" rx="5" fill="#e2e8f0"/>
  <path d="M234 118l36 25-36 25z" fill="#0f766e"/>

  <!-- audio waveform bars (kept clear of the card and the badge) -->
  <g fill="#ffffff">
    <rect x="84"  y="246" width="9" height="20" rx="4.5"/>
    <rect x="101" y="234" width="9" height="44" rx="4.5"/>
    <rect x="118" y="224" width="9" height="64" rx="4.5"/>
    <rect x="135" y="238" width="9" height="36" rx="4.5"/>
    <rect x="152" y="230" width="9" height="52" rx="4.5"/>
    <rect x="169" y="242" width="9" height="28" rx="4.5"/>
    <rect x="186" y="234" width="9" height="44" rx="4.5"/>
    <rect x="203" y="246" width="9" height="20" rx="4.5"/>
  </g>

  <!-- markdown badge -->
  <rect x="228" y="228" width="76" height="56" rx="14" fill="#ffffff" opacity="0.97"/>
  <text x="266" y="266" text-anchor="middle" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="30" font-weight="800" fill="#0f766e">MD</text>
</svg>
